<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำนักงบประมาณ - การบริหารงบประมาณแผ่นดินของประเทศไทย</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                    },
                    colors: {
                        'bb-blue': '#0a192f',
                        'bb-gold': '#d4af37',
                    }
                }
            }
        }
    </script>
    <style>
        body { -ms-overflow-style: none; scrollbar-width: none; }
        body::-webkit-scrollbar { display: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .phase-card, .info-card, .law-card, .type-card, .eval-card { transition: all 0.3s ease; }
        .phase-card:hover, .info-card:hover { transform: translateY(-5px); }
        .law-card:hover, .type-card:hover, .eval-card:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }
        
        .nav-link { position: relative; font-weight: 600; color: #475569; transition: all 0.2s ease; cursor: pointer;}
        .nav-link:hover { color: #1e40af; }
        .nav-link.active { color: #1e40af; }
        .nav-link.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, #1e40af, #3b82f6); border-radius: 99px;
        }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tree-line-v { width: 2px; background-color: #cbd5e1; margin: 0 auto; }
        .glass-badge {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .floating-shape { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 1; opacity: 0.4; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased pt-16 flex flex-col min-h-screen">

    <nav class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md shadow-md z-50 transition-all duration-300 border-b border-blue-100">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Seal_of_the_Office_of_the_Prime_Minister_of_Thailand.svg" alt="Budget Bureau Logo" class="h-10 w-10 object-contain">
                    <span class="font-bold text-slate-800 text-lg sm:text-xl tracking-tight">สำนักงบประมาณ</span>
                </div>
                <div class="flex space-x-2 sm:space-x-8 overflow-x-auto whitespace-nowrap scrollbar-hide">
                    <a id="nav-cycle" onclick="loadPage('cycle.html', this)" class="nav-link active px-1 py-5 transition-all"><i class="fa-solid fa-arrows-spin mr-1.5"></i> วงจร</a>
                    <a id="nav-type" onclick="loadPage('type.html', this)" class="nav-link px-1 py-5 transition-all"><i class="fa-solid fa-sitemap mr-1.5"></i> ประเภทงบฯ</a>
                    <a id="nav-law" onclick="loadPage('law.html', this)" class="nav-link px-1 py-5 transition-all"><i class="fa-solid fa-scale-balanced mr-1.5"></i> กฎหมาย</a>
                    <a id="nav-evaluation" onclick="loadPage('evaluation.html', this)" class="nav-link px-1 py-5 transition-all"><i class="fa-solid fa-magnifying-glass-chart mr-1.5"></i> ประเมินผล</a>
                </div>
            </div>
        </div>
    </nav>

    <main id="content-area" class="flex-grow w-full">
        </main>

    <footer class="bg-slate-900 text-slate-400 py-10 text-center text-sm border-t border-slate-800 mt-auto">
        <div class="flex justify-center mb-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Seal_of_the_Office_of_the_Prime_Minister_of_Thailand.svg" alt="Footer Logo" class="h-12 w-12 opacity-50 grayscale hover:grayscale-0 transition-all duration-300">
        </div>
        <p>&copy; 2569 สำนักงบประมาณ (Budget Bureau) - เอกสารสรุปความรู้วงจรการงบประมาณแผ่นดิน <br class="sm:hidden"> อัปเดตข้อมูลล่าสุด 21 มีนาคม 2569</p>
    </footer>

    <script>
        async function loadPage(pageUrl, navElement) {
            try {
                // Fetch the HTML content
                const response = await fetch(pageUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const html = await response.text();
                
                // Inject the HTML into the content area
                const contentArea = document.getElementById('content-area');
                contentArea.innerHTML = html;
                
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });

                // Update active navigation styling
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                if(navElement) {
                    navElement.classList.add('active');
                }
            } catch (error) {
                document.getElementById('content-area').innerHTML = `
                    <div class="text-center py-24 text-red-500 max-w-lg mx-auto">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i>
                        <h2 class="text-xl font-bold mb-2">ไม่สามารถโหลดหน้าเว็บได้ (CORS Error)</h2>
                        <p class="text-slate-600 text-sm">หากคุณเปิดไฟล์นี้จากเครื่องโดยตรง (file://) โปรดรันผ่าน Local Web Server เช่น <b>Live Server</b> ใน VS Code เพื่อให้ระบบดึงไฟล์ย่อยได้สำเร็จ</p>
                    </div>`;
            }
        }

        // Load the cycle.html page by default when the site loads
        window.addEventListener('DOMContentLoaded', () => {
            loadPage('cycle.html', document.getElementById('nav-cycle'));
        });
    </script>
</body>
</html>
